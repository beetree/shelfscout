<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShelfScout</title>
    <meta name="description" content="Shelf, stock, and in-store discovery workflows.">
    <style>
      :root {
        --bg: #f5f1e8;
        --surface: #fffdf8;
        --text: #1b1a18;
        --muted: #635d55;
        --accent: #0f766e;
        --accent-2: #9a3412;
        --border: #d9d1c4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(154, 52, 18, 0.12), transparent 30%),
          var(--bg);
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        width: min(760px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 24px 80px rgba(27, 26, 24, 0.10);
      }
      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent-2);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(40px, 6vw, 72px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }
      p {
        margin: 20px 0 0;
        max-width: 58ch;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.6;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
      }
      .footer {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
        font-size: 15px;
        color: var(--muted);
      }
      a { color: inherit; }
      @media (max-width: 640px) {
        .card {
          padding: 28px;
          border-radius: 18px;
        }
        p { font-size: 17px; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">LEET Group</p>
        <h1>ShelfScout</h1>
        <p>Shelf, stock, and in-store discovery workflows.</p>
        <div class="status"><span class="dot"></span> Initial site setup in progress</div>
        <div class="footer">
          Questions: <a href="mailto:info@leetgroup.net">info@leetgroup.net</a>
        </div>
      </section>
    </main>
  </body>
</html>
